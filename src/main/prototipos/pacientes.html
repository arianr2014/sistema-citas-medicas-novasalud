<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pacientes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- sitio -->
    <link href="css/estilos.css" rel="stylesheet">
    <style>
        .container-main{width:90%; margin:30px auto;}
    </style>
</head>

<body class="bg-light">

    <div class="container container-main">

        <div class="d-flex justify-content-between mb-3">
          <h4 class="text-green fw-bold">
            <i class="bi bi-calendar-check"></i> Listado de Pacientes
        </h4>
        <a href="paciente-form.html" class="btn btn-success">
            <i class="bi bi-plus"></i> Nuevo
        </a>
    </div>

    <div class="card mb-3">
        <div class="card-body row g-3">

            <div class="col-md-4">
                <input id="txtBuscar" class="form-control" placeholder="Buscar paciente">
            </div>

            <div class="col-md-2">
                <button class="btn btn-success" onclick="buscar()">
                    <i class="bi bi-search"></i>
                </button>
            </div>

        </div>
    </div>

    <div class="card">
        <div class="card-body table-responsive">

            <table class="table table-hover align-middle table-green">
                <thead class="bg-success text-white">
                    <tr>
                        <th>ID</th>
                        <th>DNI</th>
                        <th>Nombre</th>
                        <th>Teléfono</th>
                        <th>Dirección</th>
                        <th>Acciones</th>
                    </tr>
                </thead>

                <tbody id="tablaPacientes"></tbody>

            </table>

        </div>
    </div>

</div>

<script>
    let data = [
        { id:1, dni:'12345678', nombre:'Pedro Sanchez', tel:'999111111', dir:'Av Lima' },
        { id:2, dni:'87654321', nombre:'Ana Perez', tel:'988222222', dir:'Av Peru' }
        ];

    function cargar(){
        let html='';
        data.forEach(p=>{
            html+=`
            <tr>
            <td>${p.id}</td>
            <td>${p.dni}</td>
            <td>${p.nombre}</td>
            <td>${p.tel}</td>
            <td>${p.dir}</td>
            <td>
            <a href="paciente-form.html?id=${p.id}" class="btn btn-outline-success btn-sm">
            <i class="bi bi-pencil"></i>
            </a>
            <button class="btn btn-outline-danger btn-sm" onclick="eliminar(${p.id})">
            <i class="bi bi-x"></i>
            </button>
            </td>
            </tr>`;
        });
        document.getElementById("tablaPacientes").innerHTML=html;
    }

    function eliminar(id){
        if(confirm("¿Eliminar?")){
            data=data.filter(p=>p.id!==id);
            cargar();
        }
    }

    function buscar(){
        let txt=document.getElementById("txtBuscar").value.toLowerCase();
        let filtrado=data.filter(p=>p.nombre.toLowerCase().includes(txt));
        document.getElementById("tablaPacientes").innerHTML='';
        filtrado.forEach(p=>{
            document.getElementById("tablaPacientes").innerHTML+=`
            <tr>
            <td>${p.id}</td>
            <td>${p.dni}</td>
            <td>${p.nombre}</td>
            <td>${p.tel}</td>
            <td>${p.dir}</td>
            <td>-</td>
            </tr>`;
        });
    }

    cargar();
</script>

</body>
</html>
