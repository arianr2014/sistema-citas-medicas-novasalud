<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<title>Médico</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<!-- Bootstrap Icons -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

</head>

<body class="bg-light">

	<div class="container" style="width:70%; margin:40px auto;">
		<div class="card">

			

			<!-- HEADER -->
			<div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
				<h4 class="mb-0">
					<i class="bi bi-calendar-plus"></i> Registrar Médico
				</h4>

				<div>
					

					<a href="medicos.html" class="btn btn-light">	<i class="bi bi-arrow-left"></i> Volver</a>

					<button class="btn btn-dark" onclick="guardar()">
						<i class="bi bi-save"></i> Guardar
					</button>
				</div>
			</div>

			<div class="card-body">
				<div class="row">

					<div class="col-md-6 mb-3">
						<label>Nombres</label>
						<input class="form-control">
					</div>

					<div class="col-md-6 mb-3">
						<label>Apellidos</label>
						<input class="form-control">
					</div>

					<div class="col-md-6 mb-3">
						<label>Especialidad</label>
						<select class="form-select">
							<option>Cardiología</option>
							<option>Pediatría</option>
						</select>
					</div>

					<div class="col-md-6 mb-3">
						<label>Teléfono</label>
						<input class="form-control">
					</div>

				</div>
			</div>

		</div>
	</div>

	<script>
		function guardar(){
			alert("Guardado correctamente");
		}
	</script>

</body>
</html>
