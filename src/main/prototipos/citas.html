<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Listado de Citas</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- sitio -->
    <link href="css/estilos.css" rel="stylesheet">

    <style>


    </style>
</head>

<body class="bg-light">

    <div class="container main-container">

        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="text-green fw-bold">
                <i class="bi bi-calendar-check"></i> Listado de Citas Médicas
            </h4>

            <a href="citas-form.html" class="btn btn-green"> <i class="bi  bi-plus-lg"></i> Nuevo</a>
        </div>

        <!-- Filtros -->
        <div class="card mb-3 shadow-sm border-0">
            <div class="card-body">
                <div class="row g-3">

                    <div class="col-md-3">
                        <label class="form-label text-green">Paciente</label>
                        <input type="text" class="form-control" placeholder="Nombre paciente">
                    </div>

                    <div class="col-md-3">
                        <label class="form-label text-green">Médico</label>
                        <select class="form-select">
                            <option value="">Todos</option>
                            <option>Dr. Juan Perez</option>
                            <option>Dra. Maria Lopez</option>
                        </select>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label text-green">Especialidad</label>
                        <select class="form-select">
                            <option value="">Todas</option>
                            <option>Cardiología</option>
                            <option>Pediatría</option>
                        </select>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label text-green">Fecha</label>
                        <input type="date" class="form-control">
                    </div>

                    <div class="col-md-12 text-end">
                        <button class="btn btn-green">
                            <i class="bi bi-search"></i> Buscar
                        </button>
                        <button class="btn btn-outline-green">
                            <i class="bi bi-x-circle"></i> Limpiar
                        </button>
                    </div>

                </div>
            </div>
        </div>

        <!-- Tabla -->
        <div class="card shadow border-0">
            <div class="card-body table-responsive">

                <table class="table table-hover align-middle table-green">
                 <thead class="bg-success text-white">
                    <tr>
                        <th>ID</th>
                        <th>DNI</th>
                        <th>Paciente</th>
                        <th>Médico</th>
                        <th>Especialidad</th>
                        <th>Fecha</th>
                        <th>Hora</th>
                        <th>Estado</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>1</td>
                        <td>12345678</td>
                        <td>Pedro Sanchez</td>
                        <td>Dr. Juan Perez</td>
                        <td>Cardiología</td>
                        <td>2026-05-10</td>
                        <td>09:00</td>
                        <td><span class="badge bg-success">PROGRAMADA</span></td>
                        <td class="text-center">
                            <button class="btn btn-outline-green btn-sm" title="Ver">
                                <i class="bi bi-eye"></i>
                            </button>
                            <button class="btn btn-outline-green btn-sm" title="Editar">
                                <i class="bi bi-pencil"></i>
                            </button>
                            <button class="btn btn-outline-danger btn-sm" title="Anular">
                                <i class="bi bi-x-circle"></i>
                            </button>
                        </td>
                    </tr>

                    <tr>
                        <td>2</td>
                        <td>87654321</td>
                        <td>Lucia Martinez</td>
                        <td>Dra. Maria Lopez</td>
                        <td>Pediatría</td>
                        <td>2026-05-11</td>
                        <td>10:00</td>
                        <td><span class="badge bg-secondary">CANCELADA</span></td>
                        <td class="text-center">
                            <button class="btn btn-outline-green btn-sm">
                                <i class="bi bi-eye"></i>
                            </button>
                            <button class="btn btn-outline-green btn-sm">
                                <i class="bi bi-pencil"></i>
                            </button>
                            <button class="btn btn-outline-danger btn-sm">
                                <i class="bi bi-x-circle"></i>
                            </button>
                        </td>
                    </tr>
                </tbody>

            </table>

        </div>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
