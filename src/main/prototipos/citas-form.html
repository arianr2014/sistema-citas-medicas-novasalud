<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registrar Cita Médica</title>

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
    .main-container {
        width: 80%;
        margin: 40px auto;
    }

    #pacienteCard {
        border: 2px solid #198754;
        border-radius: 10px;
        background-color: #f8fff9;
    }
</style>
</head>

<body class="bg-light">

<div class="container main-container">
    
    <div class="card shadow">

        <!-- HEADER -->
        <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
            <h4 class="mb-0">
                <i class="bi bi-calendar-plus"></i> Registrar Cita Médica
            </h4>

            <div>
                <a href="citas.html" class="btn btn-light"> <i class="bi bi-arrow-left"></i> Volver</a>


                <button class="btn btn-dark">
                    <i class="bi bi-save"></i> Guardar
                </button>
            </div>
        </div>

        <div class="card-body">

            <form>

                <div class="row">

                    <!-- DNI -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">DNI</label>
                        <div class="input-group">
                            <input type="text" id="dni" class="form-control" placeholder="Ingrese DNI">
                            <button type="button" class="btn btn-success" onclick="buscarPaciente()">
                                <i class="bi bi-search"></i>
                            </button>
                        </div>
                    </div>

                    <!-- TARJETA PACIENTE -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Datos del Paciente</label>

                        <div id="pacienteCard" class="p-3">

                            <div><strong><i class="bi bi-person"></i> Nombre:</strong> 
                                <span id="p_nombre">-</span>
                            </div>

                            <div><strong><i class="bi bi-telephone"></i> Teléfono:</strong> 
                                <span id="p_telefono">-</span>
                            </div>

                            <div><strong><i class="bi bi-geo-alt"></i> Dirección:</strong> 
                                <span id="p_direccion">-</span>
                            </div>

                        </div>
                    </div>

                    <!-- Especialidad -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Especialidad</label>
                        <select id="especialidad" class="form-select" onchange="cargarMedicos()">
                            <option value="">Seleccione especialidad</option>
                            <option value="1">Cardiología</option>
                            <option value="2">Pediatría</option>
                            <option value="3">Dermatología</option>
                        </select>
                    </div>

                    <!-- Médico -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Médico</label>
                        <select id="medico" class="form-select" onchange="cargarHorarios()">
                            <option value="">Seleccione médico</option>
                        </select>
                    </div>

                    <!-- Fecha -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Fecha</label>
                        <input type="date" id="fecha" class="form-control" onchange="cargarHorarios()">
                    </div>

                    <!-- Hora -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Hora</label>
                        <select id="hora" class="form-select">
                            <option value="">Seleccione hora</option>
                        </select>
                    </div>

                    <!-- Observaciones -->
                    <div class="col-md-12 mb-3">
                        <label class="form-label">Observaciones</label>
                        <textarea id="obs" class="form-control" rows="3"></textarea>
                    </div>

                </div>

            </form>

        </div>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
// 🔍 Buscar paciente
function buscarPaciente() {
    let dni = document.getElementById("dni").value;

    if (dni === "12345678") {
        document.getElementById("p_nombre").innerText = "Pedro Sanchez";
        document.getElementById("p_telefono").innerText = "988111111";
        document.getElementById("p_direccion").innerText = "Av Lima 123";
    } else {
        document.getElementById("p_nombre").innerText = "-";
        document.getElementById("p_telefono").innerText = "-";
        document.getElementById("p_direccion").innerText = "-";
        alert("Paciente no encontrado");
    }
}

// 👨‍⚕️ Cargar médicos
function cargarMedicos() {
    let especialidad = document.getElementById("especialidad").value;
    let medico = document.getElementById("medico");

    medico.innerHTML = '<option value="">Seleccione médico</option>';

    if (especialidad == "1") {
        medico.innerHTML += '<option value="1">Dr. Juan Perez</option>';
    }
    if (especialidad == "2") {
        medico.innerHTML += '<option value="2">Dra. Maria Lopez</option>';
    }
}

// ⏰ Cargar horarios
function cargarHorarios() {
    let medico = document.getElementById("medico").value;
    let fecha = document.getElementById("fecha").value;
    let hora = document.getElementById("hora");

    hora.innerHTML = '<option value="">Seleccione hora</option>';

    if (medico && fecha) {
        hora.innerHTML += '<option>08:00</option>';
        hora.innerHTML += '<option>09:00</option>';
        hora.innerHTML += '<option>10:00</option>';
    }
}
</script>

</body>
</html>
