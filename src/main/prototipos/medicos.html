<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<title>Médicos</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
	<!-- sitio -->
	<link href="css/estilos.css" rel="stylesheet">
</head>

<body class="bg-light">

	<div class="container" style="width:90%; margin:30px auto;">

		<div class="d-flex justify-content-between mb-3">
			<h4 class="text-green fw-bold">
				<i class="bi bi-calendar-check"></i> Listado de Médicos
			</h4>
			<a href="medico-form.html" class="btn btn-success">
				<i class="bi bi-plus"></i> Nuevo
			</a>
		</div>

		<table class="table table-hover align-middle table-green">
			<thead class="bg-success text-white">
				<tr>
					<th>ID</th>
					<th>Nombre</th>
					<th>Especialidad</th>
					<th>Teléfono</th>
					<th>Acciones</th>
				</tr>
			</thead>

			<tbody id="tablaMedicos"></tbody>

		</table>

	</div>

	<script>
		let medicos=[
			{id:1, nom:'Juan Perez', esp:'Cardiología', tel:'999111'},
			{id:2, nom:'Maria Lopez', esp:'Pediatría', tel:'988222'}
			];

		function cargar(){
			let html='';
			medicos.forEach(m=>{
				html+=`
				<tr>
				<td>${m.id}</td>
				<td>${m.nom}</td>
				<td>${m.esp}</td>
				<td>${m.tel}</td>
				<td>
				<a href="medico-form.html?id=${m.id}" class="btn btn-outline-success btn-sm">
				<i class="bi bi-pencil"></i>
				</a>
				<button class="btn btn-outline-danger btn-sm" onclick="eliminar(${m.id})">
				<i class="bi bi-x"></i>
				</button>
				</td>
				</tr>`;
			});
			document.getElementById("tablaMedicos").innerHTML=html;
		}

		function eliminar(id){
			if(confirm("¿Eliminar médico?")){
				medicos=medicos.filter(m=>m.id!==id);
				cargar();
			}
		}

		cargar();
	</script>

</body>
</html>
