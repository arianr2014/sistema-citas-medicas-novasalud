<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}NovaSalud{% endblock %}</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background-color: #f4f6f9; }
    .sidebar {
      min-height: 100vh;
      background: linear-gradient(180deg, #0d6efd 0%, #0a58ca 100%);
    }
    .sidebar .nav-link { color: rgba(255,255,255,.8); }
    .sidebar .nav-link:hover,
    .sidebar .nav-link.active { color: #fff; background: rgba(255,255,255,.15); border-radius: .375rem; }
    .sidebar .brand { color: #fff; font-weight: 700; font-size: 1.2rem; }
    .card-stat { border-left: 4px solid; }
    .card-stat.blue  { border-color: #0d6efd; }
    .card-stat.green { border-color: #198754; }
    .card-stat.yellow{ border-color: #ffc107; }
    .card-stat.red   { border-color: #dc3545; }
  </style>
</head>
<body>
<div class="container-fluid">
  <div class="row">
    <!-- Sidebar -->
    <nav class="col-md-2 d-md-block sidebar py-3 px-2">
      <div class="brand mb-4 ps-2">
        <i class="bi bi-hospital-fill me-2"></i>NovaSalud
      </div>
      <ul class="nav flex-column gap-1">
        <li class="nav-item">
          <a class="nav-link {% if request.resolver_match.url_name == 'index' %}active{% endif %}"
             href="{% url 'index' %}">
            <i class="bi bi-house me-2"></i>Inicio
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if 'cita' in request.resolver_match.url_name %}active{% endif %}"
             href="{% url 'cita_list' %}">
            <i class="bi bi-calendar2-check me-2"></i>Citas
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if 'paciente' in request.resolver_match.url_name %}active{% endif %}"
             href="{% url 'paciente_list' %}">
            <i class="bi bi-people me-2"></i>Pacientes
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if 'medico' in request.resolver_match.url_name %}active{% endif %}"
             href="{% url 'medico_list' %}">
            <i class="bi bi-person-badge me-2"></i>Médicos
          </a>
        </li>
        <li class="nav-item mt-3">
          <a class="nav-link" href="{% url 'admin:index' %}">
            <i class="bi bi-gear me-2"></i>Administración
          </a>
        </li>
      </ul>
    </nav>

    <!-- Main content -->
    <main class="col-md-10 ms-sm-auto py-4 px-4">
      {% if messages %}
        {% for msg in messages %}
          <div class="alert alert-{{ msg.tags }} alert-dismissible fade show" role="alert">
            {{ msg }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}

      {% block content %}{% endblock %}
    </main>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmFPNBbBMRxiPg6BHEfmMnlVMXe"
        crossorigin="anonymous"></script>
</body>
</html>
